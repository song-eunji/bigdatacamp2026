<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 모아보기</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="top-nav">
    <a href="app.html">← 기록으로 돌아가기</a>
    <span></span>
</div>

<h1>📁 포트폴리오 모아보기</h1>
<div class="sub">지금까지 저장한 포트폴리오를 프로젝트별로 모아봤어요. "공개"로 전환하면 링크로 공유할 수 있어요.</div>

<div class="stat-row">
    <div class="stat-card"><div class="num" id="statProjects">0</div><div class="label">프로젝트</div></div>
    <div class="stat-card"><div class="num" id="statPortfolios">0</div><div class="label">저장된 포트폴리오</div></div>
    <div class="stat-card"><div class="num" id="statLogs">0</div><div class="label">누적 기록</div></div>
</div>

<section>
    <h2>필터</h2>
    <div class="row">
        <select id="projectFilter"></select>
        <input type="text" id="portfolioSearch" placeholder="🔍 내용 검색">
    </div>
</section>

<section>
    <h2>🧩 종합 포트폴리오 만들기</h2>
    <div class="hint">여러 프로젝트를 골라서, 하나로 이어지는 종합 포트폴리오를 만들어요. 캠프 전체를 마무리할 때 써보세요.</div>
    <div id="combineProjectList" class="cat-btns"></div>
    <button id="combineGenBtn" disabled>선택한 프로젝트로 종합 포트폴리오 만들기</button>
    <div id="combineLoading" class="hint" style="display:none;">생성 중...</div>
    <div id="combineError" style="color:#E64848; font-size:13px; display:none; margin-top:6px;"></div>
    <div id="combineResultBox" style="display:none; margin-top:12px;">
        <textarea id="combineResultEdit" style="min-height:200px;"></textarea>
        <button id="combineSaveBtn">이 내용으로 저장</button>
        <span id="combineSaveConfirm" style="font-size:12px; color:var(--primary); margin-left:8px; display:none; font-weight:600;">저장했어요 ✓</span>
    </div>
</section>

<section>
    <h2>포트폴리오</h2>
    <div id="portfolioEmpty" class="empty">아직 저장된 포트폴리오가 없어요. 기록 페이지에서 초안을 만들고 저장해보세요.</div>
    <ul id="portfolioList"></ul>
</section>

<script>
    const SUPABASE_URL = 'https://svtfrpcjqgzotbdqzdgt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_fXOS6yGOHTCxs7t0w_a0wA_N2O8by1u';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DB_NAME = 'portfolioResults';
    const STORE_NAME = 'files';

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.innerText = str;
        return div.innerHTML;
    }

    function downloadText(filename, text) {
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function openDb() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = () => request.result.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    function allFiles(db) {
        return new Promise((resolve, reject) => {
            const request = db.transaction(STORE_NAME).objectStore(STORE_NAME).getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function ensureAuth() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) return session.user;
        const { data, error } = await sb.auth.signInAnonymously();
        if (error) throw error;
        return data.user;
    }

    let filterProjectId = 'all';
    let searchTerm = '';
    let uploadedItems = [];
    let projectsCache = [];
    let portfoliosCache = [];
    let currentUser = null;
    let selectedCombineIds = new Set();

    async function fetchStats() {
        const [{ count: projectCount }, { count: portfolioCount }, { count: logCount }] = await Promise.all([
            sb.from('projects').select('id', { count: 'exact', head: true }),
            sb.from('portfolios').select('id', { count: 'exact', head: true }).eq('user_id', currentUser.id),
            sb.from('logs').select('id', { count: 'exact', head: true }),
        ]);
        document.getElementById('statProjects').textContent = projectCount || 0;
        document.getElementById('statPortfolios').textContent = portfolioCount || 0;
        document.getElementById('statLogs').textContent = logCount || 0;
    }

    function renderProjectFilter() {
        const sel = document.getElementById('projectFilter');
        sel.innerHTML = '<option value="all">전체 프로젝트</option>' +
            projectsCache.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
        sel.value = filterProjectId;
    }

    document.getElementById('projectFilter').addEventListener('change', (e) => {
        filterProjectId = e.target.value;
        renderGallery();
    });

    function renderCombineProjectList() {
        const container = document.getElementById('combineProjectList');
        container.innerHTML = '';
        projectsCache.forEach(p => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'cat-btn' + (selectedCombineIds.has(p.id) ? ' active' : '');
            btn.textContent = p.name;
            btn.addEventListener('click', () => {
                if (selectedCombineIds.has(p.id)) selectedCombineIds.delete(p.id);
                else selectedCombineIds.add(p.id);
                renderCombineProjectList();
            });
            container.appendChild(btn);
        });
        document.getElementById('combineGenBtn').disabled = selectedCombineIds.size < 2;
    }

    document.getElementById('combineGenBtn').addEventListener('click', async () => {
        const ids = [...selectedCombineIds];
        if (ids.length < 2) return;

        const loadingEl = document.getElementById('combineLoading');
        const errorEl = document.getElementById('combineError');
        const resultBoxEl = document.getElementById('combineResultBox');
        const resultEditEl = document.getElementById('combineResultEdit');
        const genBtn = document.getElementById('combineGenBtn');
        errorEl.style.display = 'none';
        resultBoxEl.style.display = 'none';
        loadingEl.style.display = 'block';
        genBtn.disabled = true;

        try {
            const selectedProjects = projectsCache.filter(p => ids.includes(p.id));
            const [{ data: logs }, { data: profile }] = await Promise.all([
                sb.from('logs').select('*').in('project_id', ids).order('date', { ascending: true }),
                sb.from('profiles').select('*').maybeSingle(),
            ]);

            const logsByProject = selectedProjects.map(p => {
                const projectLogs = (logs || []).filter(l => l.project_id === p.id);
                const logText = projectLogs.map(l => `[${l.date}][${l.category || '기타'}] ${l.text}`).join('\n');
                return `### 프로젝트: ${p.name}\n${logText || '(기록 없음)'}`;
            }).join('\n\n');

            const projectNames = selectedProjects.map(p => p.name).join(' · ');
            const profileLine = profile && profile.job ? `- 지원 관점: ${profile.job} (${profile.year || '미상'})\n` : '';

            const prompt = `아래는 여러 프로젝트에서 각각 매일 남긴 짧은 활동 기록입니다. 각 프로젝트는 "### 프로젝트: 이름"으로 구분되고, 그 아래 [날짜][분류] 텍스트 형식의 기록이 있습니다.

이 기록들을 바탕으로, 여러 프로젝트를 관통하는 하나의 성장 스토리로 이어지는 종합 포트폴리오를 실제 채용 담당자가 읽는 것처럼 **STAR 기법(상황-과제-행동-결과)**과 **정량적 성과 중심(XYZ 형식)**으로 정리해주세요.

반드시 아래 마크다운 형식과 순서를 그대로 지켜 작성하세요. 제목을 바꾸거나 섹션을 생략하지 마세요.

# 종합 포트폴리오

## 한 줄 요약
(여러 프로젝트를 관통하는 성장·역량을 1~2문장으로. XYZ 형식 지향)

## 참여 프로젝트 개요
${profileLine}각 프로젝트를 한 줄씩 요약 (프로젝트명 - 핵심 활동)

## 주요 활동
프로젝트별로 "### 프로젝트명 - 소제목" 형식으로 2~4개 활동을 정리하고, 각 활동은 반드시 아래 STAR 구조로 2~3문장 이상 구체적으로 작성하세요.
- 상황(Situation):
- 과제(Task):
- 행동(Action):
- 결과(Result): (수치화 가능하면 수치로, 아니면 구체적인 정성적 결과로)

## 핵심 성과 요약
(불릿 4~6개, 프로젝트를 넘나드는 공통 강점이나 성장 포인트 중심으로, "~함으로써 ~를 ~만큼" 형태 지향)

규칙:
- 항목마다 근거가 된 프로젝트명과 날짜를 표시 (예: (빅데이터캠프 · 07/13))
- 기록에 없는 사실·수치는 절대 만들어내지 말 것 — 없으면 정성적으로 서술
- 한국어로 작성, 전체 2500자 내외로 충분히 상세하게
- <br> 등 HTML 태그는 절대 사용하지 말 것. 줄바꿈은 실제 줄바꿈 문자로 표시

기록:
${logsByProject}`;

            const res = await fetch('/api/portfolio', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data?.error || `요청 실패 (status ${res.status})`);
            if (!data.reply) throw new Error('응답에서 결과를 찾지 못했어요.');

            resultEditEl.value = data.reply.replace(/<br\s*\/?>/gi, '\n');
            resultEditEl.dataset.projectName = `종합 포트폴리오 (${projectNames})`;
            resultBoxEl.style.display = 'block';
        } catch (e) {
            errorEl.textContent = e.message || '알 수 없는 오류가 발생했어요.';
            errorEl.style.display = 'block';
        } finally {
            loadingEl.style.display = 'none';
            genBtn.disabled = selectedCombineIds.size < 2;
        }
    });

    document.getElementById('combineSaveBtn').addEventListener('click', async () => {
        const resultEditEl = document.getElementById('combineResultEdit');
        const content = resultEditEl.value.trim();
        if (!content || !currentUser) return;
        const { error } = await sb.from('portfolios').insert({
            user_id: currentUser.id,
            project_id: null,
            project_name: resultEditEl.dataset.projectName || '종합 포트폴리오',
            content,
        });
        if (error) { console.error(error); return; }
        document.getElementById('combineSaveConfirm').style.display = 'inline';
        await loadPortfolios();
        renderGallery();
        fetchStats();
    });

    document.getElementById('portfolioSearch').addEventListener('input', (e) => {
        searchTerm = e.target.value.trim().toLowerCase();
        renderGallery();
    });

    function renderGallery() {
        const all = portfoliosCache;
        let list = filterProjectId === 'all' ? all : all.filter(p => String(p.project_id) === String(filterProjectId));
        if (searchTerm) {
            list = list.filter(p => p.content.toLowerCase().includes(searchTerm) || (p.project_name || '').toLowerCase().includes(searchTerm));
        }

        const galleryEl = document.getElementById('portfolioList');
        const emptyEl = document.getElementById('portfolioEmpty');
        galleryEl.innerHTML = '';
        emptyEl.style.display = list.length === 0 ? 'block' : 'none';
        emptyEl.textContent = all.length === 0
            ? '아직 저장된 포트폴리오가 없어요. 기록 페이지에서 초안을 만들고 저장해보세요.'
            : '조건에 맞는 포트폴리오가 없어요.';

        list.slice().reverse().forEach(p => {
            const li = document.createElement('li');
            li.className = 'log-item';
            const dateStr = (p.created_at || '').slice(0, 10);
            const flatPreview = p.content
                .replace(/<br\s*\/?>/gi, ' ')
                .replace(/^#{1,6}\s*/gm, '')
                .replace(/[*_`>]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            const preview = flatPreview.length > 40 ? flatPreview.slice(0, 40) + '…' : flatPreview;

            const related = uploadedItems.filter(f => f.projectId === p.project_id);
            const relatedHtml = related.length === 0 ? '' : `
                <div class="related-uploads">
                    <div class="ru-title">📎 관련 결과물</div>
                    <ul>
                        ${related.map(f => `<li>${f.kind === 'link' ? `🔗 ${escapeHtml(f.name)}` : `📄 ${escapeHtml(f.name)}`} <button class="secondary" data-open-id="${f.id}">열기</button></li>`).join('')}
                    </ul>
                </div>
            `;

            const shareUrl = `${location.origin}${location.pathname.replace('portfolios.html', '')}share.html?id=${p.id}`;

            li.innerHTML = `
                <div class="log-summary">
                    <span class="log-date">${dateStr}<span class="tag">${escapeHtml(p.project_name || '프로젝트')}</span>${p.is_public ? '<span class="tag">🌐 공개중</span>' : ''}</span>
                    <span class="log-preview">${escapeHtml(preview)}</span>
                    <span class="chevron">▸</span>
                </div>
                <div class="log-detail" style="display:block;">
                    <div class="portfolio-render">${marked.parse(p.content)}</div>
                    <textarea style="min-height:180px; display:none;">${escapeHtml(p.content)}</textarea>
                    <button data-action="make-slide">🎬 슬라이드로 만들기</button>
                    <button class="secondary" data-action="edit-toggle">✎ 텍스트 편집</button>
                    <button class="secondary" data-action="copy">복사</button>
                    <button class="secondary" data-action="download">⬇ 다운로드</button>
                    <button class="secondary" data-action="save" style="display:none;">저장</button>
                    <button class="secondary" data-action="delete">삭제</button>
                    <span class="mini-confirm" data-role="copy-confirm">복사했어요 ✓</span>
                    ${relatedHtml}
                </div>
            `;

            const textarea = li.querySelector('textarea');
            const renderEl = li.querySelector('.portfolio-render');
            const editToggleBtn = li.querySelector('[data-action="edit-toggle"]');
            const saveBtn = li.querySelector('[data-action="save"]');
            li.querySelector('.log-summary').addEventListener('click', () => li.classList.toggle('open'));

            li.querySelector('[data-action="make-slide"]').addEventListener('click', (e) => {
                e.stopPropagation();
                window.open(shareUrl, '_blank', 'noopener');
            });

            editToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const editing = textarea.style.display !== 'none';
                textarea.style.display = editing ? 'none' : 'block';
                renderEl.style.display = editing ? 'block' : 'none';
                saveBtn.style.display = editing ? 'none' : 'inline-block';
                editToggleBtn.textContent = editing ? '✎ 텍스트 편집' : '취소';
                if (!editing) textarea.value = p.content;
            });

            li.querySelector('[data-action="copy"]').addEventListener('click', async (e) => {
                e.stopPropagation();
                try {
                    await navigator.clipboard.writeText(textarea.value);
                    showMiniConfirm(li);
                } catch (err) {
                    alert('복사에 실패했어요. 직접 선택해서 복사해주세요.');
                }
            });
            li.querySelector('[data-action="download"]').addEventListener('click', (e) => {
                e.stopPropagation();
                downloadText(`${p.project_name || '포트폴리오'}_${dateStr}.txt`, textarea.value);
            });
            saveBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const newContent = textarea.value.trim();
                if (!newContent) return;
                await sb.from('portfolios').update({ content: newContent, updated_at: new Date().toISOString() }).eq('id', p.id);
                await loadPortfolios();
                renderGallery();
            });
            li.querySelector('[data-action="delete"]').addEventListener('click', async (e) => {
                e.stopPropagation();
                await sb.from('portfolios').delete().eq('id', p.id);
                await loadPortfolios();
                renderGallery();
                fetchStats();
            });

            li.querySelectorAll('[data-open-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const item = uploadedItems.find(f => String(f.id) === btn.dataset.openId);
                    if (!item) return;
                    if (item.kind === 'link') {
                        if (/^https?:\/\//i.test(item.url)) window.open(item.url, '_blank', 'noopener');
                        else alert(item.url);
                    } else {
                        window.open(URL.createObjectURL(item.file), '_blank', 'noopener');
                    }
                });
            });

            galleryEl.appendChild(li);
        });
    }

    function showMiniConfirm(li) {
        const confirmEl = li.querySelector('[data-role="copy-confirm"]');
        confirmEl.style.display = 'inline';
        setTimeout(() => confirmEl.style.display = 'none', 1500);
    }

    async function loadPortfolios() {
        const { data, error } = await sb.from('portfolios').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true });
        let rows = error ? [] : data;

        const broken = rows.filter(p => /<br\s*\/?>/i.test(p.content));
        if (broken.length) {
            await Promise.all(broken.map(p =>
                sb.from('portfolios').update({ content: p.content.replace(/<br\s*\/?>/gi, '\n') }).eq('id', p.id)
            ));
            rows = rows.map(p => broken.includes(p) ? { ...p, content: p.content.replace(/<br\s*\/?>/gi, '\n') } : p);
        }

        portfoliosCache = rows;
    }

    async function init() {
        currentUser = await ensureAuth();

        const [{ data: projects }] = await Promise.all([
            sb.from('projects').select('*').order('created_at', { ascending: true }),
        ]);
        projectsCache = projects || [];
        renderProjectFilter();
        renderCombineProjectList();

        await loadPortfolios();
        await fetchStats();

        try {
            const db = await openDb();
            uploadedItems = await allFiles(db);
        } catch (e) {
            uploadedItems = [];
        }

        renderGallery();
    }

    init().catch(err => {
        console.error(err);
        document.getElementById('portfolioEmpty').textContent = '불러오는 중 오류가 발생했어요. 새로고침해보세요.';
        document.getElementById('portfolioEmpty').style.display = 'block';
    });
</script>
</body>
</html>
