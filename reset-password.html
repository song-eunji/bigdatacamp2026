<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 찾기</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<main class="auth-page">
    <h1>비밀번호 찾기</h1>
    <section>
        <form id="resetForm" class="auth-form">
            <input id="resetEmail" type="email" placeholder="이메일을 입력해주세요." autocomplete="email" required>
            <button type="submit">비밀번호 재설정 메일 보내기</button>
            <div id="resetMessage" class="auth-note" role="status"></div>
        </form>
        <div class="auth-note"><a href="login.html">로그인으로 돌아가기</a></div>
    </section>
</main>
<script>
    const SUPABASE_URL = 'https://svtfrpcjqgzotbdqzdgt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_fXOS6yGOHTCxs7t0w_a0wA_N2O8by1u';
    const authClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    document.getElementById('resetForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const message = document.getElementById('resetMessage');
        const { error } = await authClient.auth.resetPasswordForEmail(
            document.getElementById('resetEmail').value.trim(),
            { redirectTo: `${window.location.origin}/update-password.html` },
        );
        message.textContent = error ? '재설정 메일을 보내지 못했어요.' : '비밀번호 재설정 메일을 보냈어요. 이메일을 확인해 주세요.';
        message.style.color = error ? '#E64848' : '';
    });
</script>
</body>
</html>
