<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 공유</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    #shareContent h1 { font-size: 22px; margin: 0 0 6px; }
    #shareContent h2 { font-size: 16px; margin: 20px 0 8px; color: var(--primary-dark); }
    #shareContent h3 { font-size: 14px; margin: 14px 0 6px; }
    #shareContent p, #shareContent li { font-size: 14px; line-height: 1.7; }
    #shareContent ul { padding-left: 20px; }
    #shareContent a { color: var(--primary); }
    .byline { font-size: 13px; color: var(--text-soft); margin-bottom: 20px; }
</style>
</head>
<body>

<div class="top-nav">
    <span>📓 활동 기록 → 포트폴리오</span>
    <span></span>
</div>

<div id="loadingState" class="empty">불러오는 중...</div>
<div id="notFoundState" class="empty" style="display:none;">이 포트폴리오를 찾을 수 없거나 비공개 상태예요.</div>

<div id="shareBox" style="display:none;">
    <div class="byline" id="shareByline"></div>
    <section>
        <div id="shareContent"></div>
    </section>
</div>

<script>
    const SUPABASE_URL = 'https://svtfrpcjqgzotbdqzdgt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_fXOS6yGOHTCxs7t0w_a0wA_N2O8by1u';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function init() {
        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        const loadingEl = document.getElementById('loadingState');
        const notFoundEl = document.getElementById('notFoundState');
        const boxEl = document.getElementById('shareBox');

        if (!id) {
            loadingEl.style.display = 'none';
            notFoundEl.style.display = 'block';
            return;
        }

        // is_public = true인 포트폴리오는 RLS 정책상 로그인 없이도 조회 가능
        const { data, error } = await sb.from('portfolios').select('*').eq('id', id).eq('is_public', true).maybeSingle();

        loadingEl.style.display = 'none';

        if (error || !data) {
            notFoundEl.style.display = 'block';
            return;
        }

        document.title = `${data.project_name || '포트폴리오'} — 공유된 포트폴리오`;
        document.getElementById('shareByline').textContent =
            `${data.project_name || '프로젝트'} · ${(data.created_at || '').slice(0, 10)} 작성`;
        document.getElementById('shareContent').innerHTML = marked.parse(data.content);
        boxEl.style.display = 'block';
    }

    init().catch(err => {
        console.error(err);
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('notFoundState').textContent = '불러오는 중 오류가 발생했어요.';
        document.getElementById('notFoundState').style.display = 'block';
    });
</script>
</body>
</html>
