<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<main class="auth-page">
    <h1>비밀번호 재설정</h1>
    <section>
        <form id="updatePasswordForm" class="auth-form">
            <input id="newPassword" type="password" placeholder="새 비밀번호를 입력해주세요." autocomplete="new-password" required>
            <button type="submit">비밀번호 변경</button>
            <div id="updateMessage" class="auth-note" role="status"></div>
        </form>
    </section>
</main>
<script>
    const SUPABASE_URL = 'https://svtfrpcjqgzotbdqzdgt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_fXOS6yGOHTCxs7t0w_a0wA_N2O8by1u';
    const authClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    authClient.auth.onAuthStateChange((_event, session) => {
        if (!session) document.getElementById('updateMessage').textContent = '유효하지 않거나 만료된 링크입니다.';
    });
    document.getElementById('updatePasswordForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const message = document.getElementById('updateMessage');
        const { error } = await authClient.auth.updateUser({ password: document.getElementById('newPassword').value });
        message.textContent = error ? '비밀번호를 변경하지 못했어요.' : '비밀번호가 변경됐어요. 로그인 페이지로 이동합니다.';
        if (!error) setTimeout(() => { window.location.href = 'login.html'; }, 1000);
    });
</script>
</body>
</html>
